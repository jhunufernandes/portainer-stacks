services:
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:?CLOUDFLARED_IMAGE_TAG is required}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_CLOUDFLARED_TUNNEL_TOKEN:?CF_CLOUDFLARED_TUNNEL_TOKEN is required}
    networks:
      - cloudflared_network
networks:
  cloudflared_network:
    external: true